[server]
port = 3000
health_path = "/health"
# Minimum outage duration before sending service_reconnected notifications.
# Unit: ms
service_reconnect_notification_threshold_ms = 600000

[bots.ops]
allowed_users = ["ou_ops_operator", "ou_ops_backup"]

[bots.ops.server]
card_path = "/bots/ops/webhook/card"
event_path = "/bots/ops/webhook/event"

[bots.ops.feishu]
app_id = "cli_ops_example"
app_secret = "ops_app_secret"
verification_token = "ops_verification_token"
encrypt_key = "ops_encrypt_key"

# Screenshot support is opt-in per bot. Declare tasks.sc explicitly if this bot should allow /run sc.
[bots.ops.tasks.sc]
runner_kind = "builtin-tool"
execution_mode = "oneshot"
description = "Capture the current screen and return the image to this chat"
tool = "screencapture"
timeout_ms = 30000
cancellable = false

[bots.ops.tasks.say-hello]
runner_kind = "external-command"
execution_mode = "oneshot"
description = "Run the host echo command."
command = "/bin/echo"
args = ["hello", "{{name}}"]
timeout_ms = 5000
cancellable = false

[bots.ops.tasks.say-hello.parameters.name]
type = "string"
required = true
description = "Name to greet"

[bots.ops.tasks.check-pd-win11]
runner_kind = "builtin-tool"
execution_mode = "cronjob"
description = "Monitor a Parallels Desktop Windows 11 VM and push lifecycle notifications."
tool = "checkPDWin11"
timeout_ms = 5000
cancellable = false

[bots.ops.tasks.check-pd-win11.cron]
schedule = "*/1 * * * *"
auto_start = false

[bots.ops.tasks.check-pd-win11.config]
vm_name_match = "Windows 11"
